services:
  postgres:
    image: postgres:16
    container_name: mini-micro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mini_micro
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mini_micro"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

# =============================================================================
# klines-tools 分析服务配置
# =============================================================================
# 本配置文件控制 K 线指标分析服务的全部行为。
# 所有阈值均可配置化调整，避免硬编码导致无法适应不同行情环境。
#
# 配置结构：
#   [features]        - Feature Flag 开关，控制各阶段增强功能
#   [indicator]       - 指标计算参数（周期、乘数等）
#   [state]           - 状态机参数（进入/退出阈值、确认期、冷却期等）
#   [grid]            - 网格计划参数（网格数量、边界模式、费率等）
#   [risk]            - 风险控制参数（仓位限制、回撤上限、止损比例等）
#   [data_quality]    - 数据质量阈值（延迟容忍度、缺失比例上限等）
#   [multi_timeframe] - 多周期分析配置（周期组合模式）
# =============================================================================

# -----------------------------------------------------------------------------
# 服务基础配置
# -----------------------------------------------------------------------------

# 服务监听地址与端口。
# 格式："IP:PORT"，例如 "127.0.0.1:8081" 仅本地访问，"0.0.0.0:8081" 对外暴露。
bind = "127.0.0.1:8081"

# app-api 服务的基础 URL。
# klines-tools 本身不存储 K 线数据，而是通过 HTTP 从 app-api 拉取。
# 例如 "http://127.0.0.1:8080" 对应本地 app-api。
app_api_base_url = "http://127.0.0.1:8080"

# 调用 app-api 的单次 HTTP 请求超时时间（秒）。
# K 线数据查询可能涉及较大时间范围，建议 >= 10 秒。
http_timeout_secs = 30

# 默认数据源名称。
# 当 API 请求未指定 source 参数时使用此值。
# 常见值："binance"、"bingx"、"okx"。
default_source = "binance"


# =============================================================================
# [features] Feature Flag 开关
# =============================================================================
# 所有增强功能均可独立开关。
# 关闭的功能在分析时不会计算对应指标，也不会参与评分和状态判断。
# 生产环境只应开启经过回测、样本外验证和灰度验证的功能。
#
# Phase 分类：
#   Phase 1 — MVP 核心，始终启用（无需开关）
#   Phase 2 — 状态稳定性增强，建议灰度后开启
#   Phase 3 — 准实盘能力，需要交易所有约束数据配合
#   Phase 4 — 后置增强，默认关闭，需消融回测验证
# =============================================================================

[features]

# ------ Phase 2：状态稳定性增强 ------

# 多周期分析。
# 开启后，analyze_multi_tf 接口可用，综合分析 higher/middle/lower 三个周期。
# 关闭时只支持单周期分析，多周期接口返回错误。
# Phase 3 能力，需要消融回测验证后才能生产开启。
enable_multi_timeframe = false

# Donchian Channel（唐奇安通道）。
# 用于判断箱体高低点突破，补充 BOLL 的区间识别。
# Phase 2 增强指标。
enable_donchian = false

# BOLL %B。
# 表示价格在布林带内的相对位置（0~1 或超出）。
# > 0.8 表示靠近上轨，< 0.2 表示靠近下轨。用于价格位置判断。
enable_percent_b = true

# EMA20 偏离率。
# 计算 (close - EMA20) / EMA20，衡量价格相对中期均值的偏离程度。
enable_ema20_deviation = true

# 评分动能（score_momentum）。
# 计算当前评分与上一根 K 线评分的差值。
# 可用于判断状态切换的加速度，但可能引入额外抖动。
enable_score_momentum = false

# 评分互斥修正。
# 当 up_score 或 down_score >= warning_enter 时，range_score 乘以 0.7。
# 用于防止震荡评分与趋势评分同时高企时的矛盾输出。
# 建议保持开启。
enable_score_conflict_adjustment = true

# 假突破过滤器。
# 检测突破后是否快速回归区间内（缩量、ADX 未继续上升、结构未形成）。
# 可减少假突破导致的误切换，但可能延迟真突破的确认。
enable_fake_breakout_filter = false

# ------ Phase 3：准实盘能力 ------

# 交易所约束校验。
# 开启后 GridLevel 的 price/qty 会按 tick_size/step_size 取整，
# 并校验 min_qty/min_notional 限制。
# 需要配置 ExchangeConstraints 具体参数。
enable_exchange_constraints = false

# ------ Phase 4：后置增强（默认关闭，需消融回测验证） ------

# Keltner Channel（肯特纳通道）。
# 用于突破和波动扩张的二次确认，与 BOLL 互补。
enable_keltner = false

# OBV（能量潮）。
# 辅助判断成交量趋势，与价格趋势是否背离。
enable_obv = false

# VWAP 偏离率。
# 衡量成交均价相对 VWAP 的偏离程度，辅助判断成交质量。
enable_vwap_deviation = false

# 机器学习分类器（预留）。
# 开启后可用于 LightGBM/XGBoost 特征分类，替代或辅助规则模型。
# 当前为占位开关，实际模型需单独训练和部署。
enable_ml_classifier = false

# 盘口微观结构（预留）。
# 开启后可分析 order_book_imbalance、spread、depth 等高频数据。
# 需要 Level2 数据源支持，v1 不依赖。
enable_orderbook_features = false


# =============================================================================
# [indicator] 指标计算参数
# =============================================================================
# 每个指标都有默认周期和乘数。
# 参数变更会改变评分结果，必须重新回测校准并更新 config_version。

[indicator]

# BOLL（布林带）周期。
# 20 是业界标准值。周期越小，带宽越敏感，假信号越多。
boll_period = 20

# BOLL 标准差乘数。
# 2.0 是标准值，意味着上下轨距离中轨各 2 个标准差（约 95% 价格区间）。
# 增大则带宽更宽，突破信号更少但更可靠。
boll_mult = 2.0

# MACD 快线周期。
# 12 是标准值。越小对价格变化越敏感。
macd_fast = 12

# MACD 慢线周期。
# 26 是标准值。快慢线差值构成 DIF。
macd_slow = 26

# MACD 信号线周期（DEA 周期）。
# 9 是标准值。DEA 是 DIF 的 EMA，用于金叉/死叉判断。
macd_signal = 9

# ATR（平均真实波幅）周期。
# 14 是 Wilder 原始定义值。用于衡量市场波动率。
atr_period = 14

# ADX（平均趋向指数）周期。
# 14 是标准值。ADX < 20 表示无明显趋势，>= 25 表示趋势较强。
adx_period = 14

# RSI（相对强弱指标）周期。
# 14 是 Wilder 原始定义值。RSI 40~60 偏中性，> 70 超买，< 30 超卖。
rsi_period = 14

# Volume Ratio 的均量周期。
# 当前成交量 / SMA(volume, period)。
# >= 1.5 放量，0.7~1.3 平稳，< 0.7 缩量。
volume_ma_period = 20

# Donchian Channel 周期。
# 20 根 K 线的最高/最低价构成通道。
donchian_period = 20

# 评分平滑周期。
# 使用 EMA(smooth_period) 对原始评分进行平滑。
# 3~5 是合理范围。越大越平滑但越滞后。
score_smooth_period = 3

# 滚动分位数窗口大小。
# 用于历史归一化，需要 >= 500 才有统计意义。
# 样本不足时使用固定阈值兜底并降低 confidence。
percentile_window = 1000

# 分位数计算的最小样本数。
# 当样本数 < 此值时使用固定阈值，而非分位数。
percentile_min_samples = 100

# Swing Point 识别：左侧确认 bar 数。
# 当前 high 必须高于左 pivot_left 根 K 线的 high 才可能成为 swing_high。
pivot_left = 2

# Swing Point 识别：右侧确认 bar 数。
# 当前 high 必须高于右 pivot_right 根 K 线的 high 才可能成为 swing_high。
# 实时模式下，只有右侧 pivot_right 根 K 线闭合后才能确认 swing 点。
pivot_right = 2

# 价格结构回看窗口大小。
# 用于判断 HH/HL/LH/LL（更高高点/更高低点/更低高点/更低低点）。
structure_lookback = 20


# =============================================================================
# [state] 状态机参数
# =============================================================================
# 控制六状态状态机的进入/退出阈值、确认期、冷却期、假突破过滤等。
# 进入和退出使用不同阈值，避免临界抖动（滞后效应）。

[state]

# ---------------------------------------------------------------------------
# range_score 阈值
# ---------------------------------------------------------------------------

# 震荡网格进入阈值。
# range_score >= 此值且 up_score/down_score 均 < warning_enter 时，
# 候选状态为 RangeGrid。
range_enter = 65

# 震荡网格退出阈值。
# range_score < 此值时，即使当前处于 RangeGrid 也会清理候选状态。
# 退出阈值必须 < 进入阈值，形成滞后带。
range_exit = 55

# ---------------------------------------------------------------------------
# up_score / down_score 阈值
# ---------------------------------------------------------------------------

# 突破预警进入阈值。
# up_score >= 此值 → UpBreakWarning；down_score >= 此值 → DownBreakWarning。
warning_enter = 55

# 突破预警退出阈值。
# 评分回落至此值以下时，清理 warning 候选状态。
warning_exit = 45

# 趋势候选阈值。
# 评分 >= 此值时进入对应的趋势状态（UptrendFollow / DowntrendRisk）。
# 趋势候选仍需满足连续 confirm_bars 才能 confirmed。
trend_candidate = 70

# 趋势确认增强阈值。
# 评分 >= 此值时，在连续确认期内可加速确认。
trend_confirm = 80

# ---------------------------------------------------------------------------
# 确认与过滤
# ---------------------------------------------------------------------------

# 状态确认所需连续闭合 K 线根数。
# 候选状态需连续满足此数量后才能进入 confirmed。
# 3 是保守值，减少假切换。可根据交易频率调整。
confirm_bars = 3

# 假突破检测窗口（K 线根数）。
# 进入 warning 后，在此窗口内检查是否回归区间。
# 仅当 enable_fake_breakout_filter = true 时生效。
fake_breakout_window = 3

# 突破成交量确认阈值。
# volume_ratio >= 此值视为放量突破，降低假突破判定概率。
# 仅当 enable_fake_breakout_filter = true 时生效。
breakout_volume_confirm_threshold = 1.5

# ---------------------------------------------------------------------------
# 冷却期
# ---------------------------------------------------------------------------

# 退出普通网格后的冷却期（K 线根数）。
# 冷却期内不能重新进入 RangeGrid。
# 用于避免刚退出就重新进入的频繁切换。
cooldown_bars_after_exit = 5

# 止损后的冷却期（K 线根数）。
# 止损后使用更长的冷却期，避免在不利行情中反复开仓。
# 必须 >= cooldown_bars_after_exit。
cooldown_bars_after_stop_loss = 20


# =============================================================================
# [grid] 网格计划参数
# =============================================================================
# 控制网格的几何结构、边界模式、成本约束等。

[grid]

# 网格层数。
# 将 BOLL 上下轨之间的空间等分为 grid_count 个格子。
# 层数越多，单格利润越薄，但成交频率越高。
grid_count = 20

# 网格边界模式。
# "boll" — 使用 BOLL 上下轨作为网格边界。
# "donchian" — 使用 Donchian Channel 作为边界（需 enable_donchian）。
# "range" — 使用价格结构的 range_high/range_low 作为边界。
boundary_mode = "boll"

# 最小利润缓冲（小数，如 0.001 = 0.1%）。
# 单格利润必须 > 2 * fee_rate + expected_slippage_rate + min_profit_buffer。
# 否则网格设置在经济上不可行。
min_profit_buffer = 0.001

# Maker 手续费率（小数）。
# 用于计算网格买卖的保本点。
# 0.001 = 0.1%，常见于 Binance 现货 maker 费率。
fee_rate = 0.001

# 预期滑点率（小数）。
# 0.0005 = 0.05%，保守估计的成交滑点。
expected_slippage_rate = 0.0005

# 网格宽度上限（相对价格的百分比）。
# 如果 (upper - lower) / center > 此值，网格太宽，confidence 降低。
# 0.08 = 8%，适用于中等波动品种。
max_grid_width_by_percent = 0.08

# 网格宽度上限（相对 ATR 的倍数）。
# 如果 (upper - lower) / ATR > 此值，视为波动超出网格承载范围。
max_grid_width_by_atr = 6.0

# 下限时的最大资金占用比例。
# 用于估算开满网格所需资金，超过此比例则降低网格层数或 confidence。
max_capital_usage_at_lower_bound = 0.5


# =============================================================================
# [risk] 风险控制参数
# =============================================================================
# 控制仓位限制、回撤容忍度、止损触发条件等。
# 这些参数是最后一道防线，优先级高于收益优化。

[risk]

# 单交易对最大仓位比例（相对总权益）。
# 0.3 = 单个 symbol 最多占用总权益的 30%。
max_position_ratio = 0.3

# 网格最大资金占用（计价币绝对值）。
# 防止单品种网格占用过多资金。
# 例如 1000 表示最多用 1000 USDT 开网格。
max_grid_capital = 1000

# 单交易对最大亏损比例（相对该品种占用资金）。
# 0.03 = 3%，触发后执行对应的 PositionAction。
max_loss_per_symbol = 0.03

# 单日最大亏损限制（相对总权益）。
# 0.05 = 5%，触发当日禁止新开仓。
max_daily_loss = 0.05

# 最大回撤容忍度（相对总权益峰值）。
# 0.1 = 10%，触发后进入 EmergencyStop。
max_drawdown = 0.1

# 默认减仓比例。
# 当 PositionAction = ReduceByRatio 时，按此比例减少仓位。
# 0.3 = 减少当前仓位的 30%。
default_reduce_position_ratio = 0.3


# =============================================================================
# [data_quality] 数据质量阈值
# =============================================================================
# 当数据质量低于阈值时，分析结果进入 wait 或触发 DataQualityBlock。

[data_quality]

# 允许的最新 K 线最大延迟间隔数。
# 例如 interval=5m，max_latest_delay_intervals=2 → 允许延迟最多 10 分钟。
# 超过 1 个周期：降低 confidence。
# 超过 2 个周期：禁止新开普通网格。
max_latest_delay_intervals = 2

# 最大允许的 K 线缺失比例。
# missing_kline_count / total_bars > 此值时 quality_score 大幅降低。
# 0.01 = 允许 1% 的缺失率。
max_missing_kline_ratio = 0.01

# 开网格所需的最低数据质量分数。
# quality_score < 此值时，即使 RangeGrid 状态成立也不允许新开网格。
# 0.9 = 要求数据质量至少 90 分。
min_quality_score_for_grid = 0.9


# =============================================================================
# [multi_timeframe] 多周期分析配置
# =============================================================================
# 仅当 enable_multi_timeframe = true 时生效。
# 定义 higher / middle / lower 三个周期的取值。

[multi_timeframe]

# 多周期组合模式。
# "short_watch"   → 1h + 15m + 5m  短线观察
# "normal_grid"   → 4h + 30m + 5m  常规网格（默认）
# "high_freq"     → 1h + 15m + 1m  高频展示
# "intraday_risk" → 1d + 1h + 15m  日内风控
mode = "normal_grid"

# 大方向周期（higher timeframe）。
# 用于判断系统性趋势和极端风险背景。
# 常见值："4h"、"1d"、"1h"。
higher_interval = "4h"

# 中间决策周期（middle timeframe）。
# 用于判断当前是否适合网格。
# 常见值："30m"、"15m"、"1h"。
middle_interval = "30m"

# 短期执行周期（lower timeframe）。
# 用于网格触发、信号展示和成交模拟。
# 常见值："5m"、"1m"、"15m"。
lower_interval = "5m"
